services:
  mysql:
    image: mysql:8.0
    container_name: comic_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - comic_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: comic_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
      PMA_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - comic_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: comic_backend
    environment:
      FLASK_ENV: ${FLASK_ENV}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/data
    networks:
      - comic_network
    # windows bind-mount: bash runs entrypoint without crlf/shebang issues
    entrypoint: ["bash", "/app/entrypoint.sh"]
    command: ["python", "run.py"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: comic_frontend
    environment:
      BACKEND_PROXY_TARGET: http://backend:5000
    ports:
      - "5173:5173"
    networks:
      - comic_network
    depends_on:
      - backend

volumes:
  mysql_data:

networks:
  comic_network:
    driver: bridge
