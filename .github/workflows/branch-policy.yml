name: Branch Policy

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    name: Source Branch Check
    runs-on: ubuntu-latest
    steps:
      - name: Enforce PRs to main come from dev
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "ERROR: PRs to main must come from the dev branch."
            echo "This PR is from: ${{ github.head_ref }}"
            exit 1
          fi
          echo "OK: PR source branch is dev."
