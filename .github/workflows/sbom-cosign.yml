name: Build, SBOM, and Cosign Sign

on:
  push:
    branches:
      - main
      - develop
      - dev
  workflow_dispatch:
    inputs:
      registry:
        description: Container registry hostname
        required: false
        default: ghcr.io

env:
  REGISTRY: ${{ github.event.inputs.registry || 'ghcr.io' }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME || github.actor }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}
  SYFT_VERSION: v0.105.0
  COSIGN_VERSION: v2.2.2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      frontend_digest: ${{ steps.build_frontend.outputs.digest }}
      backend_digest: ${{ steps.build_backend.outputs.digest }}
      frontend_image: ${{ steps.image_vars.outputs.frontend_image }}
      backend_image: ${{ steps.image_vars.outputs.backend_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Compute image names
        id: image_vars
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "frontend_image=${{ env.REGISTRY }}/${repo}/frontend" >> "$GITHUB_OUTPUT"
          echo "backend_image=${{ env.REGISTRY }}/${repo}/backend" >> "$GITHUB_OUTPUT"

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push frontend image
        id: build_frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.image_vars.outputs.frontend_image }}:latest
            ${{ steps.image_vars.outputs.frontend_image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=Comic Book Library Frontend
            org.opencontainers.image.description=Vue.js frontend for Comic Book Library
            org.opencontainers.image.version=${{ github.sha }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push backend image
        id: build_backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image_vars.outputs.backend_image }}:latest
            ${{ steps.image_vars.outputs.backend_image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=Comic Book Library Backend
            org.opencontainers.image.description=Flask backend for Comic Book Library
            org.opencontainers.image.version=${{ github.sha }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  sbom:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | \
            sh -s -- -b /usr/local/bin ${{ env.SYFT_VERSION }}
          syft --version

      - name: Generate frontend SBOM (CycloneDX)
        run: |
          syft "${{ needs.build.outputs.frontend_image }}:${{ github.sha }}" \
            -o cyclonedx-json > frontend-sbom-cyclonedx.json
          cat frontend-sbom-cyclonedx.json

      - name: Generate frontend SBOM (SPDX)
        run: |
          syft "${{ needs.build.outputs.frontend_image }}:${{ github.sha }}" \
            -o spdx-json > frontend-sbom-spdx.json
          cat frontend-sbom-spdx.json

      - name: Generate backend SBOM (CycloneDX)
        run: |
          syft "${{ needs.build.outputs.backend_image }}:${{ github.sha }}" \
            -o cyclonedx-json > backend-sbom-cyclonedx.json
          cat backend-sbom-cyclonedx.json

      - name: Generate backend SBOM (SPDX)
        run: |
          syft "${{ needs.build.outputs.backend_image }}:${{ github.sha }}" \
            -o spdx-json > backend-sbom-spdx.json
          cat backend-sbom-spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: |
            frontend-sbom-cyclonedx.json
            frontend-sbom-spdx.json
            backend-sbom-cyclonedx.json
            backend-sbom-spdx.json
          retention-days: 90

  cosign-attest:
    runs-on: ubuntu-latest
    needs: [build, sbom]
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Install Cosign
        run: |
          curl -sSfL https://github.com/sigstore/cosign/releases/download/${{ env.COSIGN_VERSION }}/cosign-linux-amd64 -o cosign
          chmod +x cosign
          sudo mv cosign /usr/local/bin/
          cosign version

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbom-files

      - name: Attest frontend image SBOM (CycloneDX)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          image_ref="${{ needs.build.outputs.frontend_image }}@${{ needs.build.outputs.frontend_digest }}"
          cosign attest \
            --predicate frontend-sbom-cyclonedx.json \
            --type cyclonedx \
            "$image_ref"

      - name: Attest frontend image SBOM (SPDX)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          image_ref="${{ needs.build.outputs.frontend_image }}@${{ needs.build.outputs.frontend_digest }}"
          cosign attest \
            --predicate frontend-sbom-spdx.json \
            --type spdx \
            "$image_ref"

      - name: Attest backend image SBOM (CycloneDX)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          image_ref="${{ needs.build.outputs.backend_image }}@${{ needs.build.outputs.backend_digest }}"
          cosign attest \
            --predicate backend-sbom-cyclonedx.json \
            --type cyclonedx \
            "$image_ref"

      - name: Attest backend image SBOM (SPDX)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          image_ref="${{ needs.build.outputs.backend_image }}@${{ needs.build.outputs.backend_digest }}"
          cosign attest \
            --predicate backend-sbom-spdx.json \
            --type spdx \
            "$image_ref"

  verify-attestation:
    runs-on: ubuntu-latest
    needs: [build, cosign-attest]
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Install Cosign
        run: |
          curl -sSfL https://github.com/sigstore/cosign/releases/download/${{ env.COSIGN_VERSION }}/cosign-linux-amd64 -o cosign
          chmod +x cosign
          sudo mv cosign /usr/local/bin/
          cosign version

      - name: Verify frontend SBOM attestations
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          image_ref="${{ needs.build.outputs.frontend_image }}@${{ needs.build.outputs.frontend_digest }}"
          identity_regex="^https://github\\.com/${{ github.repository }}/\\.github/workflows/sbom-cosign\\.yml@.*$"
          cosign verify-attestation \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "$identity_regex" \
            --private-infrastructure \
            --type cyclonedx \
            "$image_ref"
          cosign verify-attestation \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "$identity_regex" \
            --private-infrastructure \
            --type spdx \
            "$image_ref"

      - name: Verify backend SBOM attestations
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          image_ref="${{ needs.build.outputs.backend_image }}@${{ needs.build.outputs.backend_digest }}"
          identity_regex="^https://github\\.com/${{ github.repository }}/\\.github/workflows/sbom-cosign\\.yml@.*$"
          cosign verify-attestation \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "$identity_regex" \
            --private-infrastructure \
            --type cyclonedx \
            "$image_ref"
          cosign verify-attestation \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "$identity_regex" \
            --private-infrastructure \
            --type spdx \
            "$image_ref"

      - name: Summary
        run: |
          echo "Frontend Image: ${{ needs.build.outputs.frontend_image }}:${{ github.sha }}"
          echo "Backend Image:  ${{ needs.build.outputs.backend_image }}:${{ github.sha }}"
