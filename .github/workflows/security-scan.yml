name: Security Scan (Trivy)

on:
  pull_request:
    branches: [ main, dev ]

jobs:
  trivy-scan:
    name: Shift-Left Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy File System Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: 'json'
          output: 'trivy-fs-results.json'

      - name: Build Backend Image
        run: docker build -t comic-backend:latest ./backend

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'comic-backend:latest'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          scanners: 'vuln'
          trivyignores: .trivyignore
          format: 'json'
          output: 'trivy-backend-results.json'

      - name: Build Frontend Image
        run: docker build -t comic-frontend:latest ./frontend

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'comic-frontend:latest'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          scanners: 'vuln'
          trivyignores: .trivyignore
          format: 'json'
          output: 'trivy-frontend-results.json'

      - name: Upload Trivy Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: 'trivy-*-results.json'
