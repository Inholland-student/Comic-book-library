name: Unit Tests

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  pytest:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass_ci
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -prootpass_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: testuser
      DB_PASSWORD: testpass_ci
      DB_NAME: testdb
      JWT_SECRET: test_jwt_secret_for_ci_not_production
      FLASK_ENV: testing
      FLASK_APP: run.py

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run migrations
        working-directory: backend
        run: flask db upgrade

      - name: Seed database
        working-directory: backend
        run: python scripts/run_init_sql.py

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short
